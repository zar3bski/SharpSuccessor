name: Build

on:
    push:
        branches: [master]
    pull_request:
        branches: [master]

jobs:
    build:
        runs-on: windows-latest

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Add MSBuild to PATH
              uses: microsoft/setup-msbuild@v2
            
            - name: Build
              run: msbuild SharpSuccessor.sln /p:Configuration=Release /p:Platform="Any CPU"

            #- name: List artifacts
            #  shell: pwsh
            #  run: Get-ChildItem -Recursive

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: SharpSuccessor
                  path: SharpSuccessor/bin/Release/SharpSuccessor.exe
